services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: tagrende_quote
      POSTGRES_USER: tagrende
      POSTGRES_PASSWORD: tagrende
    ports:
      - "5432:5432"
    volumes:
      - tagrende-postgres:/var/lib/postgresql/data

volumes:
  tagrende-postgres:
